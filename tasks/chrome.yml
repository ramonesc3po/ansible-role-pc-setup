---
- name: installing google chrome for Debian distro
  block:
    - ansible.builtin.apt:
        name: gpg
        update_cache: yes
    - name: add signing key without apt-key
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/linux_signing_key.pub
        dest: /etc/apt/trusted.gpg.d/google.asc
    - name: google Chrome repository
      ansible.builtin.lineinfile:
        dest: /etc/apt/sources.list.d/google-chrome.list
        line: "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main"
        create: yes
    - name: install google-chrome browser
      ansible.builtin.apt:
        name:
          - google-chrome-stable
        state: present
        update_cache: yes
  when: ansible_os_family == 'Debian'
  become: true
  become_method: sudo
  become_user: root
  tags:
    - install-chrome

